name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-arm-none-eabi libpng-dev

      - name: Cache agbcc
        id: cache-agbcc
        uses: actions/cache@v4
        with:
          path: agbcc
          key: agbcc-${{ runner.os }}

      - name: Build agbcc
        if: steps.cache-agbcc.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/pret/agbcc
          cd agbcc
          ./build.sh

      - name: Install agbcc
        run: |
          cd agbcc
          ./install.sh ${{ github.workspace }}

      - name: Build ROM
        run: make -j$(nproc)

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: petro-emerald-${{ github.sha }}
          path: Petro_Pokemon_Emerald_Legacy_Enhanced.gba